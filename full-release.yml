# Full Release Workflow

name: Full Release

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build Android App
        run: ./gradlew build

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build Web App
        run: npm install && npm run build

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build Desktop App
        run: npm install && npm run build-desktop

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-web, build-desktop] # Only strictly need web and android to start
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Create Release
        run: ./create-release.sh

  deploy:
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Deploy
        run: ./deploy.sh

  notify:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Notify
        run: ./notify.sh

