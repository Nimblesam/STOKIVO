name: Release Stokivo (All Platforms)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Web
        run: npm run build

      - name: Upload Web Dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-android:
    name: Build Android APK
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Download Web Dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34

      - run: npm ci

      - name: Build Capacitor Web
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Grant execute permissions to gradlew
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 1

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [build-web]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, windows-latest, ubuntu-latest]
        include:
          - os: macos-13
            artifact-name: dmg
          - os: windows-latest
            artifact-name: exe
          - os: ubuntu-latest
            artifact-name: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Web Dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Electron App
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Build Output
        run: |
          echo "Searching for build outputs..."
          find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.zip" \) -ls

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            release/**/*
            dist/**/*
            out/**/*
            build/**/*
          if-no-files-found: warn
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [build-web, build-android, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p final-assets

          echo "Copying APK..."
          find artifacts -name "*.apk" -exec cp {} final-assets/ \;

          echo "Copying Desktop files..."
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.deb" \) -exec cp {} final-assets/ \;

          echo "Final assets found:"
          ls -lah final-assets/ || echo "No files found"

      - name: Validate assets
        run: |
          if [ -z "$(ls -A final-assets 2>/dev/null)" ]; then
            echo "⚠️  Warning: No release files found, but continuing..."
          else
            echo "✅ Found files:"
            ls -lah final-assets/
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-web.outputs.version }}
          name: Release v${{ needs.build-web.outputs.version }}
          files: final-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
